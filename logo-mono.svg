<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="320" height="400">
  <defs>
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Monochrome version: all fills/strokes use currentColor so the host page can
       set color via CSS. Field is transparent (no fill). Banner is outline-only. -->

  <!-- Shield outline -->
  <path d="M 20,20 L 380,20 L 380,340 C 380,420 365,476 215,476 C 210,476 200,490 200,498 C 200,490 190,476 185,476 C 35,476 20,420 20,340 Z"
        fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- Banner — outline only, no fill -->
  <path d="M 20,20 L 380,20 L 380,82 L 20,82 Z"
        fill="none" stroke="currentColor" stroke-width="1.5"/>

  <!-- Text -->
  <text x="200" y="64"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        font-family="'Cinzel', 'Trajan Pro', 'Liberation Serif', serif"
        font-size="38"
        font-weight="500"
        letter-spacing="10"
        fill="currentColor">UNGHENI</text>

  <!-- Bow (3 rings) -->
  <g fill="none" stroke="currentColor" stroke-width="6">
    <circle cx="164" cy="190" r="46"/>
    <circle cx="236" cy="190" r="46"/>
    <circle cx="200" cy="190" r="48"/>
  </g>

  <!-- Shaft -->
  <rect x="194" y="238" width="12" height="110" fill="currentColor"/>

  <!-- Wavy bars -->
  <g fill="none" stroke="currentColor" stroke-width="5" stroke-linecap="round">
    <path d="M 40,278 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 40,308 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 40,338 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,278 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,308 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,338 q 18,-9 36,0 t 36,0 t 36,0"/>
  </g>

  <!-- Bit -->
  <rect x="175" y="352" width="50" height="10" fill="currentColor"/>
  <rect x="194" y="362" width="12" height="44" fill="currentColor"/>
  <rect x="162" y="374" width="32" height="10" fill="currentColor"/>
  <rect x="158" y="392" width="36" height="10" fill="currentColor"/>
</svg>
