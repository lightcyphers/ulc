baseURL = "https://logo.ungheni.biz/"
languageCode = "ro-MD"
title = "Ungheni — Mark Comunitar"
defaultContentLanguage = "ro"
enableEmoji = false

# Dual baseURL support: site works at both https://logo.ungheni.biz/ and
# https://lightcyphers-open.gitlab.io/ulc/ (and on local file:// preview).
# relativeURLs makes all internal links relative (../, ./), so they don't
# care which host serves them.
relativeURLs = true
canonifyURLs  = false

[params]
  description = "Mark civic comunitar pentru orașul Ungheni — reconstrucție și adaptare post-sovietică. Identitate vizuală independentă, non-oficială."
  author = "Lightcyphers SRL"
  navy = "#102a5c"
  gold = "#c89826"

[markup.goldmark.renderer]
  unsafe = true  # allow HTML in markdown for richer layout

[outputs]
  home = ["HTML"]
  page = ["HTML"]

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false
