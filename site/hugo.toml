baseURL = "https://logo.ungheni.biz/"
languageCode = "ro-MD"
title = "Logo Ungheni · Mark comunitar pentru orașul Ungheni, Moldova"
defaultContentLanguage = "ro"
enableEmoji = false
enableRobotsTXT = true

# Dual baseURL support: site works at both https://logo.ungheni.biz/ and
# https://lightcyphers-open.gitlab.io/ulc/ (and on local file:// preview).
relativeURLs = true
canonifyURLs  = false

[params]
  shortTitle = "Logo Ungheni"
  description = "Mark comunitar pentru orașul Ungheni, Republica Moldova — reconstrucție și adaptare post-sovietică a stemei istorice (cheia + apele Prutului). Identitate vizuală independentă, non-oficială, sub licență Creative Commons."
  ogDescription = "Mark comunitar Ungheni · cheie + apele Prutului · reinterpretare modernă a stemei istorice, alfabet latin, dinții cheii spre vest"
  author = "Lightcyphers SRL"
  authorURL = "https://lightcyphers.com"
  twitter = ""
  navy = "#102a5c"
  gold = "#c89826"
  keywords = [
    "Ungheni",
    "Moldova",
    "Republica Moldova",
    "logo Ungheni",
    "stema Ungheni",
    "mark comunitar Ungheni",
    "identitate vizuală Ungheni",
    "heraldic Ungheni",
    "brand civic",
    "Prut",
    "oraș-poartă",
    "Lightcyphers SRL",
    "CC BY-NC-SA",
    "open source",
    "design comunitar"
  ]
  ogLocale = "ro_RO"
  ogType = "website"

disableKinds = ["taxonomy", "term"]

[markup.goldmark.renderer]
  unsafe = true

[taxonomies]

[outputs]
  home = ["HTML", "RSS", "MARKDOWN"]
  page = ["HTML", "MARKDOWN"]

# Custom Markdown output format (for AI crawlers / LLM-friendly consumption)
[outputFormats.MARKDOWN]
  mediaType = "text/markdown"
  baseName = "index"
  isPlainText = true
  isHTML = false
  noUgly = true
  permalinkable = false

[mediaTypes."text/markdown"]
  suffixes = ["md"]

[minify]
  disableHTML = false
  disableCSS = false
  disableJS = false

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5
