# ============================================================
# GitHub Pages mirror — redundant publish of the Hugo site at
# https://lightcyphers.github.io/ulc/
#
# Canonical site stays at https://logo.ungheni.biz/ (GitLab Pages).
# The custom domain is NOT moved here. The <link rel="canonical">
# in layouts/_default/baseof.html points to logo.ungheni.biz so
# this mirror does not compete for SEO.
#
# Hugo build relies on relativeURLs=true in hugo.toml, so the same
# build artifact works under both the custom domain and the
# /ulc/ subpath GitHub Pages serves it at.
# ============================================================
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  HUGO_VERSION: 0.140.2

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Hugo
        run: |
          curl -fsSL -o /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb

      - name: Stage canonical assets into site/static/
        run: |
          mkdir -p site/static
          cp logo.svg site/static/
          cp logo-mini.svg site/static/
          cp logo-favicon.svg site/static/
          cp logo-mono.svg site/static/
          cp logo-mono-dark.svg site/static/
          cp logo-mono-light.svg site/static/
          cp logo-mini-mono.svg site/static/
          cp logo-mini-mono-dark.svg site/static/
          cp logo-mini-mono-light.svg site/static/
          cp brandbook.pdf site/static/ 2>/dev/null || true
          cp blueprint.pdf site/static/ 2>/dev/null || true

      - name: Build Hugo
        env:
          HUGO_ENV: production
        run: hugo --minify --source site --destination ../public

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
