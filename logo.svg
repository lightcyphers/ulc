<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="320" height="400">
  <defs>
    <!-- Cinzel — inscriptional Roman capitals, free from Google Fonts -->
    <style type="text/css">
      @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500&amp;display=swap');
    </style>
    <!-- Flat palette — Beaux-Arts restraint, no metallic faux-relief -->
    <!-- field: deep navy ink -->
    <!-- gold: single flat tone, slight darker accent for separation -->
    <clipPath id="shieldClip">
      <path d="M 20,20 L 380,20 L 380,340 C 380,420 365,476 215,476 C 210,476 200,490 200,498 C 200,490 190,476 185,476 C 35,476 20,420 20,340 Z"/>
    </clipPath>
  </defs>

  <!-- Shield field -->
  <path d="M 20,20 L 380,20 L 380,340 C 380,420 365,476 215,476 C 210,476 200,490 200,498 C 200,490 190,476 185,476 C 35,476 20,420 20,340 Z"
        fill="#102a5c"/>
  <!-- Shield rim -->
  <path d="M 20,20 L 380,20 L 380,340 C 380,420 365,476 215,476 C 210,476 200,490 200,498 C 200,490 190,476 185,476 C 35,476 20,420 20,340 Z"
        fill="none" stroke="#c89826" stroke-width="3"/>

  <!-- ============== CHIEF BANNER ============== -->
  <!-- Beaux-Arts proportioned chief: narrow band with classical inner margin -->
  <g clip-path="url(#shieldClip)">
    <rect x="0" y="20" width="400" height="62" fill="#c89826"/>
    <!-- Beaux-Arts double-rule moulding — outer frame -->
    <line x1="28" y1="26" x2="372" y2="26" stroke="#102a5c" stroke-width="0.8"/>
    <line x1="28" y1="76" x2="372" y2="76" stroke="#102a5c" stroke-width="0.8"/>
    <!-- Inner frame — 3px offset from outer, thinner stroke for hierarchy -->
    <line x1="40" y1="29" x2="360" y2="29" stroke="#102a5c" stroke-width="0.5"/>
    <line x1="40" y1="73" x2="360" y2="73" stroke="#102a5c" stroke-width="0.5"/>
  </g>

  <!-- UNGHENI — classical centered composition.
       Banner inner box: x ∈ [40, 360], y ∈ [26, 76]  →  width 320, height 50.
       Text vertically centered on midline y=51.  Letter-spacing chosen so glyph
       row spans ~210px of the 320px box (≈ 0.66 — golden-section margin). -->
  <text x="200" y="64"
        text-anchor="middle"
        dominant-baseline="alphabetic"
        font-family="'Cinzel', 'Trajan Pro', 'EB Garamond', 'Liberation Serif', serif"
        font-size="38"
        font-weight="500"
        letter-spacing="10"
        fill="#102a5c">UNGHENI</text>

  <!-- ============== KEY: BOW (3 interlinked rings) ============== -->
  <!-- centers colinear (y=190), spacing 36; side rings r=44, middle r=50 drawn last → middle appears in front (foreground) -->
  <g fill="none" stroke="#c89826" stroke-width="6">
    <circle cx="164" cy="190" r="46"/>
    <circle cx="236" cy="190" r="46"/>
    <circle cx="200" cy="190" r="48"/>
  </g>

  <!-- ============== KEY: SHAFT ============== -->
  <!-- shorter shaft to balance against a substantial bit; ends at crossbar (y=348) -->
  <rect x="194" y="238" width="12" height="110" fill="#c89826"/>



  <!-- ============== SIX WAVY BARS ============== -->
  <!-- 3 left + 3 right, around upper shaft area; clean strokes, no shadow -->
  <g fill="none" stroke="#c89826" stroke-width="5" stroke-linecap="round">
    <path d="M 40,278 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 40,308 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 40,338 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,278 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,308 q 18,-9 36,0 t 36,0 t 36,0"/>
    <path d="M 252,338 q 18,-9 36,0 t 36,0 t 36,0"/>
  </g>

  <!-- ============== KEY: BIT — drawn AFTER bars (top z-order) ==============
       Wards extend WELL past the crossbar's left edge for clear ascending key profile.
       Asymmetry: each ward bigger than the one above, dramatic left protrusion. -->
  <!-- Bit: solid filled (preserves "real key" identity) with REDUCED ward sizes
       so the visual weight doesn't dominate the composition. -->
  <!-- Crossbar (shoulder) — slimmer: 50 wide × 10 tall -->
  <rect x="175" y="352" width="50" height="10" fill="#c89826"/>
  <!-- Blade body — slim vertical spine -->
  <rect x="194" y="362" width="12" height="44" fill="#c89826"/>
  <!-- Ward 1 (upper) — 32 wide × 10 tall, modest protrusion -->
  <rect x="162" y="374" width="32" height="10" fill="#c89826"/>
  <!-- Ward 2 (lower) — 36 wide × 10 tall, subtle ascending profile -->
  <rect x="158" y="392" width="36" height="10" fill="#c89826"/>
  <!-- Flat terminus at y=406 -->
</svg>
