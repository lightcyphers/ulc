<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 20" width="16" height="20">
  <!-- Favicon variant: native 16×20 viewBox so 1 unit = 1 pixel at display size.
       All elements are FILLED (no thin strokes that disappear under anti-aliasing).
       Heraldic identity preserved through abstracted shapes:
       - shield silhouette with bottom point (the "virgulă")
       - one gold trefoil-suggestive ellipse for the bow
       - solid shaft
       - two stacked horizontal bars for the bit (ascending profile cue) -->

  <!-- Shield: filled navy, with bottom point (virgulă) -->
  <path d="M1.5,1 H14.5 V12.5 C14.5,16.5 12.5,17.5 8,19 C3.5,17.5 1.5,16.5 1.5,12.5 Z"
        fill="#102a5c"/>

  <!-- Bow: single filled ellipse representing the trefoil at limit resolution -->
  <ellipse cx="8" cy="5.5" rx="4" ry="2.5" fill="#c89826"/>

  <!-- Shaft -->
  <rect x="7" y="7" width="2" height="6" fill="#c89826"/>

  <!-- Bit: two stacked horizontal bars (ascending profile cue) -->
  <rect x="5" y="13" width="6" height="1.2" fill="#c89826"/>
  <rect x="4" y="14.8" width="6" height="1.2" fill="#c89826"/>
</svg>
